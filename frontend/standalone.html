<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Demo Standalone</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family:
          Inter, "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #1d2733;
        background: #f4f7f6;
      }

      .page-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .hero {
        width: min(760px, 100%);
        padding: 40px;
        border: 1px solid #d7e1dc;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(33, 54, 46, 0.12);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #21725a;
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1.05;
      }

      .intro {
        max-width: 620px;
        margin: 20px 0 0;
        color: #53605b;
        font-size: 18px;
        line-height: 1.7;
      }

      .status-panel {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 56px;
        margin-top: 32px;
        padding: 16px 18px;
        border: 1px solid #dfe6e3;
        border-radius: 8px;
        background: #f8fbfa;
        color: #2a352f;
        line-height: 1.5;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #d6a23a;
      }

      .status-dot.ok {
        background: #1f9d68;
      }

      .status-dot.offline {
        background: #d15b4f;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="page-shell">
        <section class="hero">
          <p class="eyebrow">Vue 3 + Java 21</p>
          <h1>物业项目 Demo</h1>
          <p class="intro">
            这是一个可以直接打开的演示页。标准工程在同一个 frontend 目录里，后面可用 Vite 启动 Vue 3。
          </p>

          <div class="status-panel">
            <span class="status-dot" :class="status"></span>
            <span>{{ message }}</span>
          </div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
      const { createApp, ref, onMounted } = Vue

      createApp({
        setup() {
          const message = ref('正在连接 Java 后端...')
          const status = ref('checking')

          onMounted(async () => {
            try {
              const response = await fetch('http://localhost:8080/api/hello')
              const data = await response.json()
              message.value = data.message
              status.value = 'ok'
            } catch (error) {
              message.value = '页面已打开。启动 Java 后端后，这里会显示接口返回的数据。'
              status.value = 'offline'
            }
          })

          return {
            message,
            status
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
